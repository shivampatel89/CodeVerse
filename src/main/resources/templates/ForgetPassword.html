<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
  <title>CodeVerse | Forgot Password</title>

  <!-- CSS -->
  <link rel="stylesheet" th:href="@{/assets/vendors/mdi/css/materialdesignicons.min.css}" />
  <link rel="stylesheet" th:href="@{/assets/vendors/css/vendor.bundle.base.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/style.css}" />

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #020617;
      --panel: rgba(15, 23, 42, 0.86);
      --panel-border: rgba(255, 255, 255, 0.08);
      --primary: #6366f1;
      --accent: #22d3ee;
    }

    body {
      font-family: "Outfit", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(34, 211, 238, 0.12), transparent 30%),
        var(--bg);
      color: #f8fafc;
      min-height: 100vh;
    }

    .auth-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-panel {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1fr 0.95fr;
      gap: 24px;
    }

    .hero-card, .form-card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    .hero-card {
      padding: 44px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .hero-title {
      font-size: clamp(2rem, 4vw, 3.6rem);
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 16px;
    }

    .hero-title span {
      color: var(--primary);
    }

    .hero-copy {
      color: #cbd5e1;
      line-height: 1.7;
      max-width: 560px;
    }

    .pill {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: #e2e8f0;
      font-size: 0.9rem;
      margin-right: 10px;
      margin-top: 12px;
    }

    .form-card {
      padding: 32px;
      display: flex;
      align-items: center;
    }

    .form-control {
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      color: #fff !important;
      border-radius: 14px !important;
      min-height: 48px;
    }

    .form-control:focus {
      box-shadow: none !important;
      border-color: var(--primary) !important;
    }

    .form-label {
      color: #cbd5e1;
      margin-bottom: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #4f46e5);
      border: none;
      border-radius: 14px;
      min-height: 48px;
      font-weight: 700;
    }

    .btn-primary:hover {
      color: #fff;
    }

    .text-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .error-box {
      color: #fca5a5;
      margin-top: 12px;
      text-align: center;
    }

    @media (max-width: 991px) {
      .auth-panel {
        grid-template-columns: 1fr;
      }
      .hero-card {
        padding: 32px;
      }
    }
  </style>
</head>

<body>

<div class="auth-shell">
  <div class="auth-panel">

    <!-- LEFT SIDE -->
    <div class="hero-card">
      <div>
        <div class="hero-title">
          Reset your <span>CodeVerse</span> password.
        </div>

        <p class="hero-copy">
          Registered email daalo, OTP lo, aur naya password set karke wapas dashboard par aao.
        </p>

        <div>
          <span class="pill">Secure OTP</span>
          <span class="pill">Quick reset</span>
          <span class="pill">Back to login</span>
        </div>
      </div>
    </div>

    <!-- RIGHT SIDE FORM -->
    <div class="form-card">
      <div class="w-100">

        <h3 class="mb-2 fw-bold">Forgot Password</h3>
        <p class="mb-4 text-secondary">
          Enter your registered email to reset your password.
        </p>

        <form th:action="@{/sendOtp}" method="post">

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              type="email"
              name="email"
              class="form-control"
              placeholder="Enter your registered email"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Send OTP
          </button>

          <div class="text-center mt-3">
            <a th:href="@{/login}" class="text-link">← Back to Login</a>
          </div>

        </form>

        <!-- ERROR -->
        <div class="error-box" th:if="${error != null}" th:text="${error}"></div>

      </div>
    </div>

  </div>
</div>

<!-- JS -->
<script th:src="@{/assets/vendors/js/vendor.bundle.base.js}"></script>
<script th:src="@{/assets/js/off-canvas.js}"></script>
<script th:src="@{/assets/js/hoverable-collapse.js}"></script>
<script th:src="@{/assets/js/misc.js}"></script>
<script th:src="@{/assets/js/settings.js}"></script>
<script th:src="@{/assets/js/todolist.js}"></script>

</body>
</html>
