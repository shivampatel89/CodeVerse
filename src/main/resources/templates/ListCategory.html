<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <!-- include CSS -->
    <th:block th:replace="~{AdminCSS}"></th:block>

    <style>
      .admin-header {
        background-color: #1e3a8a;
        color: #fff;
        font-weight: 600;
      }

      .table thead th {
        color: #fff;
        font-size: 14px;
        letter-spacing: 0.5px;
      }

      .table tbody tr {
        transition: 0.2s ease-in-out;
        color: #fff;
      }

      .table tbody tr:hover {
        background-color: #f8f9fa;
        transform: scale(1.01);
      }
    </style>
  </head>

  <body>
    <div class="container-scroller">
      <!-- sidebar -->
      <th:block th:replace="~{AdminLeftSidebar}"></th:block>

      <div class="container-fluid page-body-wrapper">
        <!-- navbar -->
        <th:block th:replace="~{AdminHeader}"></th:block>

        <div class="main-panel">
          <div class="content-wrapper">
            <div class="card shadow-sm border-0">
              <div
                class="card-header admin-header d-flex justify-content-between align-items-center mb-3"
              >
                <h5 class="mb-0">Category List</h5>
                <a th:href="@{/addCategory}" class="btn btn-primary btn-sm">
                  + Add Category
                </a>
              </div>

              <div class="card-body table-responsive">
                <table class="table table-hover align-middle text-center">
                  <thead class="table-dark">
                    <tr>
                      <th>#</th>
                      <th>Category Name</th>
                      <th>Active</th>
                      <th>Action</th>
                    </tr>
                  </thead>

                  <tbody>
                    <!-- empty list case -->
                    <tr th:if="${#lists.isEmpty(categoryList)}">
                      <td colspan="4" class="text-muted">
                        No categories found
                      </td>
                    </tr>

                    <!-- loop -->
                    <tr th:each="cat, status : ${categoryList}">
                      <td th:text="${status.count}"></td>

                      <td th:text="${cat.categoryName}"></td>

                      <td>
                        <span th:if="${cat.active}" class="badge bg-success"
                          >Active</span
                        >
                        <span th:unless="${cat.active}" class="badge bg-danger"
                          >Inactive</span
                        >
                      </td>

                      <td>
                        <a
                          th:href="@{/editCategory(categoryId=${cat.categoryId})}"
                          class="btn btn-sm btn-warning"
                          >Edit</a
                        >

                        <a
                          th:href="@{/deleteCategory(categoryId=${cat.categoryId})}"
                          class="btn btn-sm btn-danger"
                          >Delete</a
                        >

                        <a
                          th:href="@{/viewCategory(categoryId=${cat.categoryId})}"
                          class="btn btn-sm btn-info"
                          >View</a
                        >
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- footer -->
          <th:block th:replace="~{AdminFooter}"></th:block>
        </div>
      </div>
    </div>
  </body>
</html>
