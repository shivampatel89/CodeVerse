<!DOCTYPE html>
<html lang="en">
<head>

<!-- Admin CSS -->
<div th:replace="AdminCSS :: *"></div>

<style>
.admin-header {
    background-color: #1e3a8a ;
    color: #fff;
    font-weight: 600;
}
.table thead th {
    color:#fff;
    font-size: 14px;
}
.table tbody tr {
    color:#fff;
}
</style>
</head>

<body>
	<div class="container-scroller">

		<!-- Sidebar -->
		<div th:replace="AdminLeftSidebar :: *"></div>

		<div class="container-fluid page-body-wrapper">

			<!-- Header -->
			<div th:replace="AdminHeader :: *"></div>

			<div class="main-panel">
				<div class="content-wrapper">

					<div class="card shadow-sm border-0">

						<div class="card-header admin-header d-flex justify-content-between">
							<h5 class="mb-0">Participant Registrations</h5>
							<a th:href="@{/listHackathon}" class="btn btn-sm btn-light">Back</a>
						</div>

						<div class="card-body table-responsive">

							<table class="table table-hover align-middle text-center">
								<thead class="table-dark">
									<tr>
										<th>Sr No</th>
										<th>User ID</th>
										<th>Team ID</th>
										<th>Status</th>
										<th>Date</th>
										<th>Stripe Session</th>
									</tr>
								</thead>

								<tbody>

									<tr th:each="r, loop : ${registrations}">
										<td th:text="${loop.count}"></td>

										<td th:text="${r.userId}"></td>

										<td th:text="${r.teamId != null ? r.teamId : 'Solo'}"></td>

										<td>
											<span
												th:class="'badge ' + (${r.paymentStatus} == 'Success' ? 'bg-success' : 'bg-warning')"
												th:text="${r.paymentStatus}">
											</span>
										</td>

										<td th:text="${r.registrationDate}"></td>

										<td class="small" th:text="${r.stripeSessionId}"></td>
									</tr>

								</tbody>
							</table>

						</div>
					</div>

				</div>

				<!-- Footer -->
				<div th:replace="AdminFooter :: *"></div>

			</div>
		</div>
	</div>
</body>
</html>
