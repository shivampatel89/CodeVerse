<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>User Profile</title>

    <!-- Admin CSS include (same as JSP include replacement) -->
    <th:block th:replace="~{AdminCSS}"></th:block>

    <style>
      .admin-header {
        background-color: #1e3a8a;
        color: #fff;
        font-weight: 600;
      }

      .table thead th {
        color: #fff;
        font-size: 14px;
        letter-spacing: 0.5px;
      }

      .table tbody tr {
        transition: 0.2s ease-in-out;
        color: #fff;
      }

      .table tbody tr:hover {
        background-color: #f8f9fa;
        transform: scale(1.01);
      }
    </style>
  </head>

  <body>
    <div class="container-scroller">
      <!-- Sidebar -->
      <th:block th:replace="~{AdminLeftSidebar}"></th:block>

      <div class="container-fluid page-body-wrapper">
        <!-- Header -->
        <th:block th:replace="~{AdminHeader}"></th:block>

        <div class="main-panel">
          <div class="content-wrapper">
            <div class="card shadow-sm border-0">
              <div class="card-header admin-header">
                <h4 class="mb-0">User Profile</h4>
              </div>

              <div class="card-body">
                <div class="row">
                  <!-- LEFT PROFILE -->
                  <div class="col-md-3 text-center">
                    <img
                      th:if="${user.profilePicURL != null}"
                      th:src="${user.profilePicURL}"
                      class="profile-img"
                    />

                    <img
                      th:if="${user.profilePicURL == null}"
                      src="https://via.placeholder.com/130"
                      class="profile-img"
                    />

                    <h5 class="mt-3">
                      <span th:text="${user.firstName}"></span>
                      <span th:text="${user.lastName}"></span>
                    </h5>

                    <span
                      class="badge bg-info text-dark"
                      th:text="${user.role}"
                    ></span>
                  </div>

                  <!-- RIGHT DETAILS -->
                  <div class="col-md-9">
                    <table class="table table-hover align-middle text-center">
                      <tr>
                        <td class="label">User ID</td>
                        <td th:text="${user.userId}"></td>
                      </tr>

                      <tr>
                        <td class="label">Email</td>
                        <td th:text="${user.email}"></td>
                      </tr>

                      <tr>
                        <td class="label">Gender</td>
                        <td th:text="${user.gender}"></td>
                      </tr>

                      <tr>
                        <td class="label">Birth Year</td>
                        <td th:text="${user.birthYear}"></td>
                      </tr>

                      <tr>
                        <td class="label">Contact No</td>
                        <td th:text="${user.contactNum}"></td>
                      </tr>

                      <tr>
                        <td class="label">Created At</td>
                        <td th:text="${user.createdAt}"></td>
                      </tr>

                      <tr>
                        <td class="label">Status</td>
                        <td>
                          <span th:if="${user.active}" class="badge bg-success"
                            >Active</span
                          >
                          <span
                            th:unless="${user.active}"
                            class="badge bg-danger"
                            >Inactive</span
                          >
                        </td>
                      </tr>

                      <!-- USER DETAIL -->
                      <tr>
                        <td class="label">Country</td>
                        <td th:text="${userDetail.country}"></td>
                      </tr>

                      <tr>
                        <td class="label">State</td>
                        <td th:text="${userDetail.state}"></td>
                      </tr>

                      <tr>
                        <td class="label">City</td>
                        <td th:text="${userDetail.city}"></td>
                      </tr>
                    </table>
                  </div>
                </div>
              </div>

              <div class="card-footer text-end">
                <a th:href="@{/listUser}" class="btn btn-secondary">Back</a>

                <a
                  th:href="@{/editUser(userId=${user.userId})}"
                  class="btn btn-warning"
                  >Edit</a
                >
              </div>
            </div>
          </div>

          <!-- Footer -->
          <th:block th:replace="~{AdminFooter}"></th:block>
        </div>
      </div>
    </div>
  </body>
</html>
